id: jcode.ext.openchamber
name: OpenChamber
version: 1.16.2
type: app
publisher: openchamber
authors:
  - Bohdan Triapitsyn (OpenChamber)
  - SST (opencode)
  - jcode (packaging)
supportedArches:
  - arm64
description: AI coding agent chat (opencode + the OpenChamber UI) — no Node.js required.
longDescription: >-
  Chat with an AI coding agent about the projects you have open in JCode. This extension ships the
  OpenChamber UI as a prebuilt static bundle (no Node.js, no npm) that talks directly to a local
  opencode agent, and it appears both here (Manage) and in the right drawer's Chat tab. Install the
  opencode binary once from Tools -> Toolchains (AI category); the agent is automatically briefed on
  JCode's environment (/workspace rules, run configs, toolchain quirks). Bring an API key or
  subscription for your preferred model provider on first run.
api:
  minApiVersion: 1
  capabilities:
    - exec
    - fs
    - workbench

# --- header fields merged from extension.jehm ---
shortDescription: AI coding agent chat in your IDE — the OpenChamber UI for opencode, shipped as a static bundle (no Node.js needed).
minJCodeVersion: 1.0.0
targetJCodeVersion: 1.0.0
category: AI
subcategory: Agents
images:
  icon: media/icon.png
  samples: []
  walkthrough: []
entry:
  manifest: extension.yaml
  ui: www/index.html
  libs: []
