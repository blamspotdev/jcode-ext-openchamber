<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenChamber</title>
<style>
  :root {
    /* Minimal dark --vscode-* palette: the UI's theme adapter reads these computed variables. */
    --vscode-editor-background: #14151d;
    --vscode-editor-foreground: #d5d9e0;
    --vscode-sideBar-background: #101118;
    --vscode-sideBar-foreground: #c8cdd6;
    --vscode-panel-background: #14151d;
    --vscode-button-background: #3d5afe;
    --vscode-button-foreground: #ffffff;
    --vscode-input-background: #1c1e29;
    --vscode-input-foreground: #d5d9e0;
    --vscode-focusBorder: #3d5afe;
    --vscode-errorForeground: #d06262;
    --vscode-descriptionForeground: #8b93a3;
    --vscode-textLink-foreground: #7f9cff;
    --vscode-editor-font-family: monospace;
    --vscode-font-family: system-ui, sans-serif;
    --vscode-font-size: 13px;
  }
  html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
  body { overflow: hidden; background: var(--vscode-editor-background); color: var(--vscode-editor-foreground);
         font-family: var(--vscode-font-family); }
  /* Fill the viewport via fixed positioning, not a height:100% percentage chain — in this WebView the
     chain collapses #root to 0 height (the app's h-full content then renders 0px tall). */
  #root { position: fixed; inset: 0; overflow: hidden; }
  #initial-loading { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; background: var(--vscode-editor-background);
    transition: opacity .3s; }
  #initial-loading.fade-out { opacity: 0; pointer-events: none; }
  .status-text { color: var(--vscode-descriptionForeground); font-size: 12.5px; }
  .spin { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #2a2d3c;
          border-top-color: var(--vscode-button-background); animation: r 1s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
<script>
  // Globals the bundled webview entry expects BEFORE it loads (see upstream webviewHtml.ts).
  window.process = window.process || { env: { NODE_ENV: 'production' }, platform: '', version: '', browser: true };
  window.__VSCODE_CONFIG__ = {
    workspaceFolder: '/workspace',
    workspaceFolders: [{ name: 'workspace', path: '/workspace' }],
    theme: 'dark',
    connectionStatus: 'connecting',
    cliAvailable: true,
    extensionVersion: '1.13.8-jcode',
    platform: 'linux',
    arch: 'arm64',
    panelType: 'chat',
    viewMode: 'sidebar',
    initialSessionId: null,
  };
  window.__OPENCHAMBER_HOME__ = '/workspace';
  window.__OPENCHAMBER_VSCODE_THEME__ = 'dark';
  // Base for any HTTP the UI issues outside the bridge (e.g. /auth/*, /health) — points at the
  // local opencode server so those requests don't resolve against the file:// origin.
  window.__OPENCHAMBER_API_BASE_URL__ = 'http://127.0.0.1:4463';
</script>
<script src="./jcode-shim.js"></script>
</head>
<body>
  <div id="initial-loading">
    <div class="spin"></div>
    <div class="status-text" id="loading-status">Starting…</div>
  </div>
  <div id="root"></div>
  <script type="module">
    const s = document.createElement('script');
    s.type = 'module';
    s.src = './webview/assets/index.js';
    document.body.appendChild(s);
  </script>
</body>
</html>
